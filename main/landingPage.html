<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Landing Page</title>
		<link
			rel="stylesheet"
			href="../css/landingPage.css" />
	</head>
	<body>
		<header>
			<div class="header-bg">
				<div class="header-inner">
					<div class="header-left">
						<div class="location">
							<span class="location-icon">
								<svg
									class="icon-location"
									xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 24 24">
									<g
										fill="none"
										stroke="#fff"
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="1.5"
										transform="translate(3.5 2)">
										<path
											d="M0.739,8.391 C0.754,4.151 4.203,0.725 8.443,0.739 C12.684,0.754 16.11,4.203 16.096,8.443 L16.096,8.530 C16.043,11.287 14.504,13.835 12.617,15.826 C11.538,16.947 10.333,17.939 9.026,18.783 C8.677,19.085 8.158,19.085 7.809,18.783 C5.860,17.514 4.150,15.913 2.757,14.052 C1.514,12.429 0.809,10.460 0.739,8.417 L0.739,8.391 Z" />
										<circle
											cx="8.417"
											cy="8.539"
											r="2.461" />
									</g>
								</svg>
							</span>
							<span class="location-text">Kirim ke: Jakarta Selatan</span>
						</div>
					</div>
					<div class="header-right">
						<div class="telp">
							<span class="telp-icon">
								<svg
									class="icon-telp"
									xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 24 24"
									fill="none"
									stroke="#fff"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round">
									<path
										d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
								</svg>
							</span>
							<span class="telp-text">0800-1234-5678 (Gratis)</span>
						</div>
						<div class="space">
							<span class="space-icon">
								<svg
									class="icon-space"
									xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 64 64">
									<text
										y="52"
										font-size="52">
										🚚
									</text>
								</svg>
							</span>
							<span class="space-text">Gratis Ongkir di atas Rp 100.000</span>
						</div>
					</div>
				</div>
			</div>
		</header>
	</body>
</html>
