<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com" />
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet" />
		<link
			rel="stylesheet"
			href="../css/landingPage.css" />
		<title>Landing Page</title>
	</head>
	<body>
		<header>
			<div class="header-bg">
				<div class="header-inner">
					<div class="header-left">
						<div class="location">
							<span class="location-icon">
								<svg
									class="icon-location"
									xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 24 24">
									<g
										fill="none"
										stroke="#fff"
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="1.5"
										transform="translate(3.5 2)">
										<path
											d="M0.739,8.391 C0.754,4.151 4.203,0.725 8.443,0.739 C12.684,0.754 16.11,4.203 16.096,8.443 L16.096,8.530 C16.043,11.287 14.504,13.835 12.617,15.826 C11.538,16.947 10.333,17.939 9.026,18.783 C8.677,19.085 8.158,19.085 7.809,18.783 C5.860,17.514 4.150,15.913 2.757,14.052 C1.514,12.429 0.809,10.460 0.739,8.417 L0.739,8.391 Z" />
										<circle
											cx="8.417"
											cy="8.539"
											r="2.461" />
									</g>
								</svg>
							</span>
							<span class="location-text">Kirim ke: Jakarta Selatan</span>
						</div>
					</div>
					<div class="header-right">
						<div class="telp">
							<span class="telp-icon">
								<svg
									class="icon-telp"
									xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 24 24"
									fill="none"
									stroke="#fff"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round">
									<path
										d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
								</svg>
							</span>
							<span class="telp-text">0800-1234-5678 (Gratis)</span>
						</div>
						<div class="space">
							<span class="space-icon">
								<svg
									class="icon-space"
									xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 64 64">
									<text
										y="52"
										font-size="52">
										🚚
									</text>
								</svg>
							</span>
							<span class="space-text">Gratis Ongkir di atas Rp 100.000</span>
						</div>
					</div>
				</div>
			</div>

			<!-- MIDDLE HEADER -->
			<div class="header-middle">
				<!-- LOGO -->
				<div class="container-logo">
					<div class="logo">
						<svg
							width="28"
							height="28"
							viewBox="0 0 36 36"
							style="vertical-align: middle; border-radius: 6px; background: rgb(0, 91, 247)">
							<text
								x="18"
								y="24"
								text-anchor="middle"
								font-size="20"
								fill="#fff">
								B
							</text>
						</svg>
						<span>BeliMudah</span>
					</div>
				</div>
				<!-- SEARCH -->
				<div class="container-search">
					<div class="form-search">
						<form action="">
							<input
								type="text"
								placeholder="Cari produk, merek, kategori..." />
							<button
								class="button-search"
								type="submit">
								<svg
									xmlns="http://www.w3.org/2000/svg"
									width="20"
									height="20"
									viewBox="0 0 24 24"
									fill="none"
									stroke="#fff"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round">
									<circle
										cx="11"
										cy="11"
										r="8" />
									<line
										x1="21"
										y1="21"
										x2="16.65"
										y2="16.65" />
								</svg>
							</button>
						</form>
					</div>
				</div>
				<!-- ICON -->
				<div class="container-icon">
					<div class="icon-notif">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.5"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="lucide lucide-bell-icon lucide-bell">
							<path d="M10.268 21a2 2 0 0 0 3.464 0" />
							<path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
						</svg>
					</div>
					<div class="icon-user">
						<svg
							width="22"
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.5"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="lucide lucide-user-icon lucide-user">
							<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
							<circle
								cx="12"
								cy="7"
								r="4" />
						</svg>
						<span class="icon-like-text">Budi</span>
					</div>
					<div class="icon-like">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.5"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="lucide lucide-heart-icon lucide-heart">
							<path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5" />
						</svg>
					</div>
					<div class="icon-cart"></div>
				</div>
			</div>

			<!-- NAV HEADER -->
			<div class="container-nav">
				<div class="all-"></div>
			</div>
		</header>
	</body>
</html>
